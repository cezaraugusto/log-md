version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # marked-terminal 7.x peers marked <16; hold marked here until it catches up
      - dependency-name: "marked"
        versions: [">=16"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
